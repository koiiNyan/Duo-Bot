name: XP Automation

on:
  schedule:
    - cron: '5 */4 * * *'  # Каждые 4 часа в 5-й минуте (UTC)
  workflow_dispatch:        # Ручной запуск

permissions:
  contents: read

jobs:
  send-xp:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Request XP from Duolingo PRO
        run: |
          echo "🚀 Starting XP automation..."
          echo "⏳ Waiting 10 seconds before request..."
          sleep 10
          
          # Проверяем токен
          TOKEN="${{ secrets.DUOLINGO_TOKEN }}"
          if [ -z "$TOKEN" ]; then
            echo "❌ ERROR: DUOLINGO_TOKEN secret is not set"
            exit 1
          fi
          
          echo "📤 Sending XP request (10,000 XP)..."
          
          # ИСПРАВЛЕНО: Уменьшено до 10,000 XP (максимально допустимое значение)
          PAYLOAD='{
            "type": "xp",
            "amount": 10000,
            "version": "3.1BETA.03",
            "lang": "ja"
          }'
          
          echo "🔄 Processing request..."
          
          RESPONSE=$(curl --silent --ssl-no-revoke -X POST https://api.duolingopro.net/request \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -H "Accept: text/event-stream" \
            -d "$PAYLOAD")
          
          # Парсим последний JSON из потока SSE
          LAST_LINE=$(echo "$RESPONSE" | tail -n1 | sed 's/^data: //')
          
          if [ -z "$LAST_LINE" ]; then
            LAST_LINE="$RESPONSE"
          fi
          
          echo "📋 Server response:"
          echo "$LAST_LINE" | jq '.' 2>/dev/null || echo "$LAST_LINE"
          
          # Проверяем различные статусы ответа
          if echo "$LAST_LINE" | grep -q '"status": "completed"'; then
            echo "✅ Request completed successfully!"
            
            # Пытаемся извлечь полученное количество XP
            XP_AMOUNT=$(echo "$LAST_LINE" | grep -o '[0-9]* XP' | grep -o '[0-9]*')
            if [ -n "$XP_AMOUNT" ]; then
              echo "🎉 Successfully received $XP_AMOUNT XP!"
            fi
            
          elif echo "$LAST_LINE" | grep -q '"status": false'; then
            # Анализируем причину отказа
            HEAD=$(echo "$LAST_LINE" | grep -o '"head": "[^"]*"' | cut -d'"' -f4)
            BODY=$(echo "$LAST_LINE" | grep -o '"body": "[^"]*"' | cut -d'"' -f4 | sed 's/<[^>]*>//g')
            MAX_AMOUNT=$(echo "$LAST_LINE" | grep -o '"max_amount": [0-9]*' | grep -o '[0-9]*')
            
            echo "⚠️  Request warning: $HEAD"
            echo "📊 Details: $BODY"
            
            if [ -n "$MAX_AMOUNT" ]; then
              echo "💡 Maximum allowed per request: $MAX_AMOUNT XP"
              echo "🔧 Suggestion: Reduce amount to $MAX_AMOUNT XP or less"
            fi
            
            # Не выходим с ошибкой, так как это не критично
            echo "ℹ️  This is a limit warning, not a failure"
            
          elif echo "$LAST_LINE" | grep -q '"status": "failed"'; then
            ERROR_MSG=$(echo "$LAST_LINE" | sed -n 's/.*"head": "\([^"]*\)".*/\1/p')
            echo "❌ Request failed: $ERROR_MSG"
            exit 1
          else
            if [ -n "$LAST_LINE" ]; then
              echo "⚠️  Received unexpected response format"
            else
              echo "❌ ERROR: No response from server"
              exit 1
            fi
          fi
          
          echo "✨ XP automation completed at: $(date -u '+%H:%M:%S UTC')"
          
      - name: Log completion
        run: |
          echo "📝 Log entry: XP automation ran"
          echo "Timestamp: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "Next scheduled run: In 4 hours"
